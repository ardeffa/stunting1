<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Istighfar Bareng</title>
  
  <!-- Memuat React dan Tailwind dari CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 selection:bg-transparent">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Komponen Ikon (Pengganti lucide-react agar bisa jalan di 1 file) ---
    const ArrowLeftIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    );
    const RotateCcwIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );
    const TapIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 4.1 12 6"/><path d="m5.1 8-2.9 1.2"/><path d="m21.3 15.3-2.7-6a2 2 0 0 0-2.7-1.1c-2.8 1.3-8 3.5-8 3.5a2 2 0 0 0-1 2.4l1.8 5.6a2 2 0 0 0 2.4 1.3l8.6-2.1a2 2 0 0 0 1.4-2.6Z"/><path d="m7.9 16.2 3.8-1.5"/></svg>
    );

    // --- Komponen Utama Aplikasi ---
    function App() {
      const [selectedCharacter, setSelectedCharacter] = useState(null);
      const [count, setCount] = useState(0);

      const characters = [
        {
          id: 'bahlil',
          name: 'Bahlil Lahadalia',
          image: 'https://upload.wikimedia.org/wikipedia/commons/2/29/Kepala_Badan_Koordinasi_Penanaman_Modal_Bahlil_Lahadalia_%28cropped%29.jpg',
          color: 'bg-blue-600', lightColor: 'bg-blue-50', borderColor: 'border-blue-500', hoverColor: 'hover:bg-blue-50'
        },
        {
          id: 'sahroni',
          name: 'Ahmad Sahroni',
          image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSClGAv5Xx8Yr-pqmIo1mtIB3Vu4GZ9utJ6ow&s',
          color: 'bg-indigo-600', lightColor: 'bg-indigo-50', borderColor: 'border-indigo-500', hoverColor: 'hover:bg-indigo-50'
        },
        {
          id: 'gibran',
          name: 'Gibran Rakabuming Raka',
          image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSJeHY9pgX79xfu-aLyC_VpRrqWUu-RpyE1yQ&s',
          color: 'bg-teal-600', lightColor: 'bg-teal-50', borderColor: 'border-teal-500', hoverColor: 'hover:bg-teal-50'
        }
      ];

      const handleSelectCharacter = (character) => {
        setSelectedCharacter(character);
        setCount(0);
      };

      if (!selectedCharacter) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4 font-sans">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden p-6 border border-slate-100">
              <div className="text-center mb-8">
                <h1 className="text-3xl font-extrabold text-slate-800 mb-2 tracking-tight">Istighfar Bareng</h1>
                <p className="text-slate-500 font-medium">Pilih teman zikir Anda hari ini</p>
              </div>

              <div className="space-y-4">
                {characters.map((char) => (
                  <button
                    key={char.id}
                    onClick={() => handleSelectCharacter(char)}
                    className={`w-full flex items-center p-4 rounded-2xl border-2 border-slate-100 ${char.hoverColor} hover:${char.borderColor} transition-all duration-300 group active:scale-95`}
                  >
                    <div className="relative">
                      <div className={`absolute -inset-1 rounded-full opacity-0 group-hover:opacity-30 blur-sm transition-opacity duration-300 ${char.color}`}></div>
                      <img
                        src={char.image}
                        alt={char.name}
                        className="w-16 h-16 rounded-full object-cover border-2 border-white shadow-sm relative z-10"
                        onError={(e) => {
                          e.target.onerror = null; 
                          e.target.src = `https://ui-avatars.com/api/?name=${char.name.replace(' ', '+')}&background=random&color=fff`;
                        }}
                      />
                    </div>
                    <div className="ml-5 text-left flex-1">
                      <h3 className="font-bold text-slate-800 text-lg group-hover:text-slate-900 transition-colors">
                        {char.name}
                      </h3>
                      <p className="text-sm font-medium text-slate-400 group-hover:text-slate-600 transition-colors flex items-center mt-1">
                        Pilih sekarang <span className="ml-1 opacity-0 group-hover:opacity-100 transition-opacity transform translate-x-0 group-hover:translate-x-1">&rarr;</span>
                      </p>
                    </div>
                  </button>
                ))}
              </div>
              <div className="mt-8 text-center">
                <p className="text-xs text-slate-400">Mari perbanyak istighfar setiap hari.</p>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4 font-sans">
          <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden relative border border-slate-200">
            <div className={`${selectedCharacter.color} p-4 text-white flex justify-between items-center shadow-md relative z-20`}>
              <button 
                onClick={() => setSelectedCharacter(null)}
                className="p-2 rounded-full hover:bg-white/20 transition-colors active:scale-90 flex items-center justify-center"
                title="Kembali ke menu utama"
              >
                <ArrowLeftIcon />
              </button>
              <h2 className="font-bold text-lg tracking-wide">Istighfar Bareng</h2>
              <div className="w-10"></div>
            </div>

            <div className="p-8 flex flex-col items-center relative">
              <div className={`absolute top-0 left-0 right-0 h-32 ${selectedCharacter.lightColor} opacity-50 rounded-b-3xl -z-10`}></div>

              <div className="relative mb-8 mt-2">
                <div className={`absolute -inset-2 rounded-full opacity-20 blur-md ${selectedCharacter.color}`}></div>
                <img
                  src={selectedCharacter.image}
                  alt={selectedCharacter.name}
                  className="w-32 h-32 rounded-full object-cover border-4 border-white shadow-xl relative z-10 transition-transform duration-300 hover:scale-105"
                  onError={(e) => {
                    e.target.onerror = null; 
                    e.target.src = `https://ui-avatars.com/api/?name=${selectedCharacter.name.replace(' ', '+')}&background=random&color=fff&size=128`;
                  }}
                />
                <div className="absolute -bottom-3 left-1/2 transform -translate-x-1/2 bg-white px-4 py-1.5 rounded-full text-xs font-bold text-slate-700 shadow-md whitespace-nowrap z-20 border border-slate-100 flex items-center space-x-2">
                  <span className={`w-2 h-2 rounded-full ${selectedCharacter.color}`}></span>
                  <span>{selectedCharacter.name}</span>
                </div>
              </div>

              <div className="bg-slate-50 w-full py-8 rounded-2xl border-2 border-slate-100 shadow-inner mb-10 flex flex-col justify-center items-center relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>
                <span className="text-sm font-medium text-slate-400 mb-2 tracking-widest uppercase">Total Hitungan</span>
                <span className={`text-7xl font-black tabular-nums tracking-tighter ${count > 0 ? 'text-slate-800' : 'text-slate-300'}`}>
                  {count}
                </span>
              </div>

              <button
                onClick={() => setCount(c => c + 1)}
                className={`w-44 h-44 rounded-full shadow-[0_15px_30px_rgba(0,0,0,0.15)] flex flex-col items-center justify-center text-white active:scale-95 transition-all duration-150 ease-out hover:shadow-[0_20px_40px_rgba(0,0,0,0.2)] hover:-translate-y-1 active:shadow-inner ${selectedCharacter.color}`}
              >
                <div className="flex flex-col items-center space-y-2">
                  <TapIcon />
                  <span className="text-2xl font-black uppercase tracking-widest drop-shadow-md">Tap</span>
                  <span className="text-xs font-medium opacity-75">Astaghfirullah</span>
                </div>
              </button>
            </div>

            <div className="bg-slate-50 p-5 border-t border-slate-100 flex justify-center mt-2">
              <button
                onClick={() => {
                  if (count > 0 && window.confirm('Apakah Anda yakin ingin mengulang hitungan dari awal?')) {
                    setCount(0);
                  }
                }}
                disabled={count === 0}
                className={`flex items-center space-x-2 px-6 py-2.5 rounded-full font-semibold transition-all ${
                  count > 0 ? 'bg-red-50 text-red-600 hover:bg-red-100 active:scale-95' : 'bg-slate-100 text-slate-400 cursor-not-allowed'
                }`}
              >
                <RotateCcwIcon />
                <span>Reset Hitungan</span>
              </button>
            </div>
          </div>
          <p className="mt-6 text-slate-500 text-sm font-medium bg-white/50 px-4 py-2 rounded-full backdrop-blur-sm shadow-sm border border-slate-200/50">
            Sentuh tombol bundar untuk memulai istighfar.
          </p>
        </div>
      );
    }

    // Render ke DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
